# ============================================================================
# VoiceLink — Release
# ============================================================================
# Triggered when a version tag (v*.*.*) is pushed.
# Builds the full installer and creates a GitHub Release with the .exe attached.
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- SAPI Bridge (C++ COM DLL) ----
      - name: Configure SAPI Bridge (CMake)
        run: cmake -B sapi_bridge/build -S sapi_bridge -G "Visual Studio 17 2022" -A x64

      - name: Build SAPI Bridge
        run: cmake --build sapi_bridge/build --config Release

      # ---- Tauri GUI (Node.js + Rust) ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: Build Tauri app
        working-directory: gui
        run: npm run tauri build

      # ---- Create GitHub Release ----
      - name: Determine tag
        id: tag
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "version=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "version=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: VoiceLink ${{ steps.tag.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            gui/src-tauri/target/release/bundle/nsis/*.exe
